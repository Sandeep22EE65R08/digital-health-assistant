<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04110b"/>
      <stop offset="100%" stop-color="#022c1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="60%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.85" cy="0.75" r="0.4">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Heart logo -->
  <g transform="translate(110,200)">
    <rect width="120" height="120" rx="28" fill="#04110b" stroke="#10b981" stroke-width="2"/>
    <path d="M60 96s-30-19-36-42c-5-21 10-32 21-25 6 4 10 10 15 16 5-6 9-12 15-16 11-7 26 4 21 25C90 77 60 96 60 96z"
          fill="url(#accent)" stroke="#ecfdf5" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="270" y="265" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="68" font-weight="700" fill="#ecfdf5">
    AI Digital Health
  </text>
  <text x="270" y="345" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="68" font-weight="700" fill="url(#accent)">
    Assistant
  </text>

  <!-- Subtitle -->
  <text x="270" y="405" font-family="'Inter', sans-serif" font-size="28" font-weight="500" fill="#bbf7d0">
    Free symptom checker · Lab report analyzer · AI doctor chat
  </text>

  <!-- Footer pill -->
  <g transform="translate(110,520)">
    <rect width="280" height="44" rx="22" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="140" y="29" text-anchor="middle" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#bbf7d0">
      Powered by Gemini · Open Source
    </text>
  </g>
  <g transform="translate(410,520)">
    <rect width="180" height="44" rx="22" fill="#a3e635" fill-opacity="0.15" stroke="#a3e635" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="90" y="29" text-anchor="middle" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#ecfccb">
      100% Free
    </text>
  </g>
</svg>
