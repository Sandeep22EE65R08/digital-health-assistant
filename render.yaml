services:
  - type: web
    name: digital-health-assistant
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Override these in the Render dashboard if you switch providers.
      - key: AI_API_BASE
        value: https://api.x.ai/v1
      - key: AI_API_MODEL
        value: grok-4.20-reasoning
      # Set this manually in the dashboard (never committed).
      - key: AI_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
